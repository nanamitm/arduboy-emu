name: Rust Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust and WebAssembly target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        # The C ABI validates nullable/raw pointers at its FFI boundary.  The
        # exported ABI must remain safe-callable, so this lint is not applicable.
        run: cargo clippy --workspace --all-targets -- -A clippy::not_unsafe_ptr_arg_deref

      - name: Run tests
        run: cargo test --workspace

      - name: Build WebAssembly client
        run: cargo build --package arduboy-wasm --target wasm32-unknown-unknown
