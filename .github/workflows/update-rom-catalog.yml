name: Update Arduboy ROM Catalog

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Check out ArduboyCollection
        run: git clone --depth=1 https://github.com/eried/ArduboyCollection.git "$RUNNER_TEMP/ArduboyCollection"

      - name: Generate catalog
        run: node scripts/build-arduboy-collection-catalog.mjs --source "$RUNNER_TEMP/ArduboyCollection" --output web/catalogs/arduboy-collection.json

      - name: Commit catalog changes
        id: commit
        run: |
          if git diff --quiet -- web/catalogs/arduboy-collection.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/catalogs/arduboy-collection.json
          git commit -m "chore(web): update Arduboy ROM catalog"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy updated catalog to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy web --project-name=arduboy-web --branch=main
