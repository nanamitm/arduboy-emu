name: Deploy Web Client to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'crates/core/**'
      - 'crates/wasm/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      # web/pkg is committed, so a Rust/wasm-pack build is not required here.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy web --project-name=arduboy-web --branch=main
